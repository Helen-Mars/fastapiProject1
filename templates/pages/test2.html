<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education Information</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-container {
            display: flex;
            justify-content: center; /* Center cards horizontally */
            gap: 20px; /* Adjust space between cards */
        }
        .card {
            max-width: 300px; /* Limit card width */
        }
    </style>
</head>
<body>

<section class="container-xxl bd-gutter masthead-followup">
    <div class="col-lg-7 mx-auto pb-3 mb-3 mb-md-5 text-md-center">
        <h2 class="display-5 mb-3 fw-semibold lh-sm">Education</h2>
        <p class="lead fw-normal">
            This is a paragraph about my education.
        </p>

        <p class="d-flex justify-content-md-start justify-content-md-center lead fw-normal">
            <a href="/docs/5.3/getting-started/download/" class="icon-link icon-link-hover fw-semibold ps-md-4">
                Visit my further education information.
                <i class="bi bi-arrow-right"></i>
            </a>
        </p>
    </div>

    <div class="container mt-5">
        <section class="row g-3 g-md-5 mb-5 pb-5">
            <!-- Flex container to center cards -->
            <div class="col-12">
                <div class="card-container">
                    <!-- Card 1 -->
                    <div class="card">
                        <img src="https://via.placeholder.com/150" class="card-img-top" alt="学校图片">
                        <div class="card-body">
                            <h5 class="card-title">教育经历标题</h5>
                            <p class="card-text">
                                <strong>学校名称:</strong> 示例大学<br>
                                <strong>学位:</strong> 理学学士<br>
                                <strong>专业:</strong> 计算机科学<br>
                                <strong>毕业年份:</strong> 2024
                            </p>
                            <a href="#" class="btn btn-primary">了解更多</a>
                        </div>
                    </div>
                    <!-- Card 2 -->
                    <div class="card">
                        <img src="https://via.placeholder.com/150" class="card-img-top" alt="学校图片">
                        <div class="card-body">
                            <h5 class="card-title">教育经历标题</h5>
                            <p class="card-text">
                                <strong>学校名称:</strong> 示例大学<br>
                                <strong>学位:</strong> 理学学士<br>
                                <strong>专业:</strong> 计算机科学<br>
                                <strong>毕业年份:</strong> 2024
                            </p>
                            <a href="#" class="btn btn-primary">了解更多</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</section>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
