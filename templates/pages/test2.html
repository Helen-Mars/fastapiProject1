<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highlight Example</title>
    <style>
        .highlight {
            background-color: yellow; /* 设置高亮背景色 */
            font-weight: bold;        /* 设置字体加粗 */
        }
    </style>
</head>
<body>
    <p>
        <span class="highlight">Hailong Ma</span>, Mengsi Zhang, Yaxian Zhang, Aiguo Hu, Yun Ding
    </p>
</body>
</html>
